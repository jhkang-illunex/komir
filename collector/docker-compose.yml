# 수집 서버 전용 compose — 분석 서버와 공유하는 것은 /data 볼륨(NAS)뿐.
services:
  collector:
    build: .
    image: komir-collector:0.1.0
    restart: unless-stopped
    volumes:
      # 예: NAS 마운트 경로로 교체 — 분석 서버가 같은 경로를 읽는다
      - /mnt/nas2_team_ai/jhkang/광해공단/collect_out:/data
    environment:
      COLLECT_OUT: /data
      COLLECT_HTTP_TIMEOUT: "30"
    # 일일 운영 정본(2026-07-12 확정): 24h 주기 수집 + 매 주기 직후 zip 번들
    command: ["python", "-m", "collector", "daemon", "--interval-mins", "1440", "--bundle-each", "--days", "2"]
    # (대안) cron 방식: 컨테이너 대신 호스트 cron에서 `docker compose run --rm collector python -m collector daily`

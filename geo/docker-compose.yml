# geo м§Җм •н•ҷ м§ҖмҲҳ нҢҢмқҙн”„лқјмқё В· Docker Compose
# к°Ғ мҠӨн…Ңмқҙм§ҖлҠ” мқјнҡҢм„ұ мӢӨн–ү(--rm). мҳҲ:
#   docker compose run --rm all           # ingestвҶ’extractвҶ’index н•ң лІҲм—җ
#   docker compose run --rm ingest        # к°ңлі„ мҠӨн…Ңмқҙм§Җ
#   GEO_DATA_HOST=/data/geo docker compose run --rm all
services:
  geo: &geo
    build: .
    image: geo:0.1.0
    env_file: [.env]                     # LLM_PROVIDER/LLM_BASE_URL/LLM_MODEL/LLM_API_KEY
    volumes:
      - ${GEO_DATA_HOST:-./geo_data}:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"   # лҰ¬лҲ…мҠӨм—җм„ң нҳёмҠӨнҠё LLM(Ollama/vLLM) м ‘к·ј
  all:      { <<: *geo, command: ["all"] }
  ingest:   { <<: *geo, command: ["ingest"] }
  extract:  { <<: *geo, command: ["extract"] }
  index:    { <<: *geo, command: ["index"] }
  refdata:  { <<: *geo, command: ["refdata", "--from", "2016", "--to", "2026"] }
  publish:  { <<: *geo, command: ["publish"] }

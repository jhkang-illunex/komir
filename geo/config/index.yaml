# 지수 공식 파라미터 ([3]의 심장 — 여기 값만 바꿔 재계산/튜닝)
half_life_weeks: 4.0
half_life_months: 3.0
# tanh0_100: 절대 스케일 0~100(50=중립). 새 기간이 추가돼도 과거 지수가 재척도되지 않음(발행값 안정).
#   (구 minmax0_100은 광종별 자기 히스토리 재척도 결함 — H1 — 으로 교체)
normalize: tanh0_100
# [2026-07-12 확정 캘리브레이션] GKG 10년 전체(LLM 재검증 통과 180.9만건)+문서(6,510건) 병합 분포.
# GKG는 CU/NI만 전용 테마코드가 있어 광종 간 주간 |raw_score| 규모가 최대 70배 차이
# (P50 실측: CU 220 / NI 81 / CO 4 / LI 3 / REE 4) — 단일 k로는 CU 포화·LI/CO/REE 무반응이라
# 광종별 k 도입. 앵커: 각 광종의 2016~2026 전체 주간 |raw_score| P90 = 지수 88.
# 이 값들은 캘리브레이션 "상수"로 동결(매 발행 재추정 금지) — 그래야 tanh 절대 스케일의
# 발행값 불변 성질이 유지된다. 코퍼스가 구조적으로 바뀔 때만 버전을 올려 재캘리브레이션하고,
# 그 경우 GEO_INDEX_VERSION(publish의 index_config_version)을 함께 올린다.
scale_k: 400.0                 # 폴백(scale_k_by_commodity에 없는 광종용)
scale_k_by_commodity:          # P90(|raw_score|) 실측 2026-07-12
  CU: 447.0
  NI: 165.0
  CO: 14.0
  LI: 12.0
  REE: 20.0
direction_sign:
  supply_down: 1.0
  price_up: 1.0
  supply_up: -0.5
  price_down: -0.5
  neutral: 0.2

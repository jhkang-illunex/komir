# 지수 공식 파라미터 ([3]의 심장 — 여기 값만 바꿔 재계산/튜닝)
half_life_weeks: 4.0
half_life_months: 3.0
# tanh0_100: 절대 스케일 0~100(50=중립). 새 기간이 추가돼도 과거 지수가 재척도되지 않음(발행값 안정).
#   (구 minmax0_100은 광종별 자기 히스토리 재척도 결함 — H1 — 으로 교체)
normalize: tanh0_100
# scale_k=10은 소수의 큐레이션 보고서(PDF/HWP) 기반 이벤트 전제로 설계된 값.
# GKG 벌크(2026-07-06 도입) 물량 반영 시 raw_score가 주당 수백~1천대(CU/NI)까지 나와 tanh가 즉시
# 포화되어 지수가 거의 전 기간 100에 붙는 문제를 실측(2016년 부분데이터, 3000/9316파일)으로 확인.
# 400으로 잠정 상향해 CU/NI는 어느정도 분산되나, LI/REE는 원래 보도량이 적어(광종 간 최대 40배 차)
# 여전히 50 부근에 눌린다 — 이는 "이번 주 지정학 뉴스가 적었다"는 정보로 볼 수도 있으나,
# 광종 간 절대비교 가능성(설계 원칙)과 상충하는 근본 이슈로 남아있음.
# TODO: 10년 전체 다운로드·파싱 완료 후 전체 분포(예: 전체 주×광종 raw_score의 상위 분위수) 기준으로
#       재보정 필요 — 지금 값은 2016년 1개년(그것도 부분)만 본 잠정치.
scale_k: 400.0                 # '심각 수준' raw 크기(지수 ~88에 대응) — 잠정 재보정(2026-07-06)
direction_sign:
  supply_down: 1.0
  price_up: 1.0
  supply_up: -0.5
  price_down: -0.5
  neutral: 0.2
